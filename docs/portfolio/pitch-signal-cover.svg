      <text x="18" y="52" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="10">METRIC</text>
      <text x="220" y="52" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="10">AVERAGE</text>
      <text x="326" y="52" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="10">LAST 5</text>
      <line x1="18" y1="62" x2="412" y2="62" stroke="#27302a"/>
      <text x="18" y="88" fill="#dfe9e1" font-family="Inter,Arial,sans-serif" font-size="12">Corners</text>
      <text x="220" y="88" fill="#dfe9e1" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700">7.5</text>
      <text x="326" y="88" fill="#65d487" font-family="Inter,Arial,sans-serif" font-size="12">8 · 7 · 9 · 6 · 8</text>
      <line x1="18" y1="102" x2="412" y2="102" stroke="#27302a"/>
      <text x="18" y="128" fill="#dfe9e1" font-family="Inter,Arial,sans-serif" font-size="12">Shots on target</text>
      <text x="220" y="128" fill="#dfe9e1" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700">6.0</text>
      <text x="326" y="128" fill="#65d487" font-family="Inter,Arial,sans-serif" font-size="12">6 · 6 · 6 · 6 · 6</text>
      <line x1="18" y1="142" x2="412" y2="142" stroke="#27302a"/>
      <text x="18" y="168" fill="#dfe9e1" font-family="Inter,Arial,sans-serif" font-size="12">Yellow cards</text>
      <text x="220" y="168" fill="#dfe9e1" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700">2.0</text>
      <text x="326" y="168" fill="#65d487" font-family="Inter,Arial,sans-serif" font-size="12">2 · 2 · 2 · 2 · 2</text>
    </g>

    <g transform="translate(474 76)">
      <rect width="558" height="188" rx="14" fill="#0d110f" stroke="#27302a"/>
      <text x="18" y="30" fill="#ecf4ee" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700">Strongest statistical signal</text>
      <rect x="442" y="16" width="96" height="26" rx="13" fill="#14251a" stroke="#3e5848"/>
      <text x="490" y="33" text-anchor="middle" fill="#65d487" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="750">HIGH  ·  82.4</text>
      <text x="18" y="74" fill="#ecf4ee" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700">Northbridge FC: corners over 5.5</text>
      <g transform="translate(18 98)">
        <text fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="10">HIT RATE</text>
        <text y="25" fill="#ecf4ee" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="750">100%</text>
        <text x="105" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="10">SAMPLE</text>
        <text x="105" y="25" fill="#ecf4ee" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="750">10</text>
        <text x="200" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="10">WILSON LB</text>
        <text x="200" y="25" fill="#ecf4ee" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="750">72.2%</text>
        <text x="318" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="10">AVERAGE</text>
        <text x="318" y="25" fill="#ecf4ee" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="750">7.5</text>
        <text x="420" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="10">OPPONENT</text>
        <text x="420" y="25" fill="#ecf4ee" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="750">7.0</text>
      </g>
      <rect x="18" y="154" width="520" height="5" rx="2.5" fill="#27302a"/>
      <rect x="18" y="154" width="428" height="5" rx="2.5" fill="#65d487"/>
    </g>
  </g>

  <g transform="translate(72 844)">
    <text fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="650">TYPESCRIPT</text>
    <circle cx="110" cy="-5" r="2" fill="#526057"/>
    <text x="126" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="650">REACT</text>
    <circle cx="189" cy="-5" r="2" fill="#526057"/>
    <text x="205" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="650">FASTIFY</text>
    <circle cx="281" cy="-5" r="2" fill="#526057"/>
    <text x="297" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="650">POSTGRESQL</text>
    <circle cx="406" cy="-5" r="2" fill="#526057"/>
    <text x="422" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="650">DOCKER</text>
    <text x="1056" text-anchor="end" fill="#65d487" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="700">github.com/akoody/pitch-signal</text>
  </g>
</svg>
