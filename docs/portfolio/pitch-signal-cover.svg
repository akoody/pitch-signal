<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title description">
  <title id="title">Pitch Signal portfolio cover</title>
  <desc id="description">Explainable football analytics platform built with TypeScript, React, Fastify and PostgreSQL</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b09"/>
      <stop offset="1" stop-color="#0d1811"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1050 20) rotate(135) scale(520)">
      <stop stop-color="#21623a" stop-opacity=".56"/>
      <stop offset="1" stop-color="#21623a" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#background)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <path d="M0 790C250 696 430 856 706 770c196-61 317-205 494-161v291H0Z" fill="#65d487" opacity=".035"/>

  <g transform="translate(72 66)">
    <rect width="62" height="62" rx="16" fill="#65d487"/>
    <text x="31" y="40" text-anchor="middle" fill="#071109" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="900" letter-spacing="-1">PS</text>
    <text x="82" y="29" fill="#ecf4ee" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="750">Pitch Signal</text>
    <text x="83" y="51" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="1.8">FOOTBALL ANALYTICS</text>
  </g>

  <g transform="translate(72 190)">
    <text fill="#65d487" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="750" letter-spacing="2.2">FULL-STACK TYPESCRIPT PLATFORM</text>
    <text y="70" fill="#ecf4ee" font-family="Inter,Arial,sans-serif" font-size="59" font-weight="780" letter-spacing="-2.8">Explainable trends.</text>
    <text y="132" fill="#ecf4ee" font-family="Inter,Arial,sans-serif" font-size="59" font-weight="780" letter-spacing="-2.8">Auditable signals.</text>
    <text y="183" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="18">Recent match data turned into transparent,</text>
    <text y="211" fill="#8c9a90" font-family="Inter,Arial,sans-serif" font-size="18">sample-aware statistical evidence.</text>
  </g>

  <g transform="translate(72 512)" filter="url(#shadow)">
    <rect width="1056" height="290" rx="22" fill="#101512" stroke="#27302a"/>
    <rect x="1" y="1" width="1054" height="54" rx="21" fill="#151c18"/>
    <circle cx="28" cy="28" r="5" fill="#65d487"/>
    <circle cx="47" cy="28" r="5" fill="#e9c95b" opacity=".75"/>
    <circle cx="66" cy="28" r="5" fill="#526057"/>
    <text x="92" y="34" fill="#dfe9e1" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="650">Northbridge FC  —  Southport Athletic</text>
    <text x="1018" y="34" text-anchor="end" fill="#65d487" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700">10 / 10 MATCHES</text>

    <g transform="translate(24 76)">
      <rect width="430" height="188" rx="14" fill="#0d110f" stroke="#27302a"/>
