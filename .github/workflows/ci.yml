name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: pitch_signal_test
          POSTGRES_USER: pitch_signal
          POSTGRES_PASSWORD: pitch_signal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pitch_signal -d pitch_signal_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://pitch_signal:pitch_signal@localhost:5432/pitch_signal_test
      FOOTBALLDATA_IO_KEY: ""
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20.19
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run check
